<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Configure Den Scout</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
body{margin:0;background:#0b0b0f;color:#e7e7ea;font:16px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
main{max-width:600px;margin:0 auto;padding:28px 18px}
h1{font-size:22px;margin:0 0 4px}p.sub{color:#9a9aa6;margin:0 0 22px}
h2{font-size:13px;color:#9a9aa6;text-transform:uppercase;letter-spacing:.05em;margin:26px 0 10px}
label{display:block;margin:0 0 6px;color:#c9c9d2}
input[type=text],input[type=password],input[type=number],select{width:100%;padding:12px;background:#16161c;border:1px solid #26262f;border-radius:10px;color:#e7e7ea;outline:none;font:inherit}
input:focus,select:focus{border-color:#5b8cff}
.chk{display:inline-flex;align-items:center;gap:8px;margin:0 14px 10px 0;color:#c9c9d2}
.chk input{width:auto}
button.primary{width:100%;margin-top:20px;padding:14px;background:#5b8cff;color:#fff;border:0;border-radius:12px;font-weight:600;font:inherit}
#out{margin-top:20px;padding:14px;background:#16161c;border:1px solid #26262f;border-radius:12px}
#url{display:block;word-break:break-all;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;color:#8ab4ff;margin-bottom:12px}
#out .row{display:flex;gap:10px}#out button,#out a{flex:1;text-align:center;padding:10px;border-radius:10px;text-decoration:none;font:inherit}
#copy{background:#22222b;color:#e7e7ea;border:1px solid #26262f}
#open{background:#3ecf8e;color:#08130d;font-weight:600}
.hidden{display:none}.err{color:#ff6b6b;min-height:18px;margin-top:8px}
.note{color:#7a7a86;font-size:13px;margin-top:6px}
</style></head><body><main>
<h1>Configure Den Scout</h1>
<p class="sub">Build your install link, then paste it into Den → Settings → Plugins. Your debrid token is encoded into the link — treat it like a password.</p>
<h2>Debrid</h2>
<label for="service">Service</label>
<select id="service"><option value="torbox">TorBox</option><option value="realdebrid">Real-Debrid</option><option value="premiumize">Premiumize</option></select>
<label for="token" style="margin-top:12px">API token</label>
<input id="token" type="password" autocomplete="off" placeholder="paste your debrid API key">
<h2>Indexers</h2>
<label class="chk"><input type="checkbox" name="indexer" value="torrentio" checked> Torrentio</label>
<label class="chk"><input type="checkbox" name="indexer" value="comet" checked> Comet</label>
<label class="chk"><input type="checkbox" name="indexer" value="mediafusion"> MediaFusion</label>
<label class="chk"><input type="checkbox" name="indexer" value="torz"> Torz</label>
<h2>Filters</h2>
<label class="chk"><input type="checkbox" id="excludeCam" checked> Hide CAM / TS / screeners</label>
<label class="chk"><input type="checkbox" id="cachedOnly" checked> Cached only (streams just work)</label>
<label class="chk"><input type="checkbox" id="hdrOnly"> HDR / Dolby Vision only</label>
<div style="margin-top:8px"><label>Resolutions (all if none)</label>
<label class="chk"><input type="checkbox" name="res" value="2160p"> 4K</label>
<label class="chk"><input type="checkbox" name="res" value="1080p"> 1080p</label>
<label class="chk"><input type="checkbox" name="res" value="720p"> 720p</label>
<label class="chk"><input type="checkbox" name="res" value="480p"> 480p</label></div>
<div style="margin-top:12px"><label for="maxSizeGB">Max size (GB, blank = no cap)</label><input id="maxSizeGB" type="number" min="0" placeholder="e.g. 25"></div>
<div style="margin-top:12px"><label for="minSeeders">Min seeders (blank = any)</label><input id="minSeeders" type="number" min="0" placeholder="e.g. 3"></div>
<div style="margin-top:12px"><label for="resultCap">Max results</label><input id="resultCap" type="number" min="1" max="200" value="20"></div>
<button id="go" class="primary">Generate install link</button>
<div class="err" id="err"></div>
<div id="out" class="hidden">
<code id="url"></code>
<div class="row"><button id="copy">Copy</button><a id="open" href="#">Open in Stremio</a></div>
<p class="note">In Den: Settings → Plugins → Add, paste this link.</p>
</div>
</main>
<script>(function(){
var $=function(id){return document.getElementById(id);};
function b64url(s){return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function checked(name){return Array.prototype.slice.call(document.querySelectorAll('input[name=\''+name+'\']:checked')).map(function(e){return e.value;});}
function num(id){var v=parseInt($(id).value,10);return isNaN(v)?undefined:v;}
function build(){
  var token=$('token').value.trim();
  var out=$('out'),url=$('url'),err=$('err');
  if(!token){err.textContent='Enter your debrid API token.';out.classList.add('hidden');return;}
  err.textContent='';
  var cfg={
    debrid:[{service:$('service').value,token:token}],
    indexers:checked('indexer'),
    filters:{excludeCam:$('excludeCam').checked,resolutions:checked('res'),hdrOnly:$('hdrOnly').checked,minSeeders:num('minSeeders'),maxSizeGB:num('maxSizeGB')},
    cachedOnly:$('cachedOnly').checked,
    resultCap:num('resultCap')||20
  };
  Object.keys(cfg.filters).forEach(function(k){var v=cfg.filters[k];if(v===undefined||(Array.isArray(v)&&v.length===0))delete cfg.filters[k];});
  var origin=location.origin;
  var manifest=origin+'/'+b64url(JSON.stringify(cfg))+'/manifest.json';
  url.textContent=manifest;out.classList.remove('hidden');
  $('open').href='stremio://'+manifest.replace(/^https?:\/\//,'');
}
$('go').addEventListener('click',build);
$('copy').addEventListener('click',function(){navigator.clipboard&&navigator.clipboard.writeText($('url').textContent);this.textContent='Copied';var b=this;setTimeout(function(){b.textContent='Copy';},1500);});
})();</script>
</body></html>
