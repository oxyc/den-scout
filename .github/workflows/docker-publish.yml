# Build the den-scout image and push it to GitHub Container Registry.
# The homelab compose pulls ghcr.io/oxyc/den-scout:<tag> (like the trailer service),
# so a code change here → new image → `docker compose pull && up -d` on the box.
name: docker-publish

# Publish only on a v* tag (deliberate release) or a manual run — NOT every main push. Per-push
# tests live in ci.yml; the box updates only when you cut a tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/den-scout

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # a v1.2.3 tag → :1.2.3, :1.2, :1, :latest (+ :sha). Publish runs on tags only, so :latest
          # is unconditional — the newest release is what the box's :latest pull gets.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
